name: Daily content expansion
on:
  schedule:
    - cron: '0 20 * * *'   # every day at 20:00 UTC
  workflow_dispatch:         # allow manual trigger

jobs:
  expand-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Claude Code content routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --print "$(cat docs/CLAUDE.md)" \
                 --allowedTools "Read,Write,WebSearch" \
                 --max-turns 20
      - name: Validate added content
        run: node scripts/validate-content.js
      - name: Commit if changes exist
        run: |
          git config user.name "MyLittleQuest Bot"
          git config user.email "bot@MyLittleQuest.app"
          git add shared/content/ docs/CHECKLIST.md
          git diff --staged --quiet || git commit -m "chore: daily content expansion [skip ci]"
          git push
